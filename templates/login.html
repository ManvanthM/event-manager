<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Event Manager – Sign in to manage and view your events.">
    <title>Event Manager – Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">

    <!-- Animated background particles -->
    <div class="particles" id="particles"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <!-- Glowing brand mark -->
            <div class="brand-icon">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="8" width="40" height="36" rx="6" stroke="currentColor" stroke-width="2.5"/>
                    <path d="M4 18h40" stroke="currentColor" stroke-width="2.5"/>
                    <path d="M16 4v8M32 4v8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    <circle cx="16" cy="28" r="2.5" fill="currentColor"/>
                    <circle cx="24" cy="28" r="2.5" fill="currentColor"/>
                    <circle cx="32" cy="28" r="2.5" fill="currentColor"/>
                    <circle cx="16" cy="36" r="2.5" fill="currentColor"/>
                    <circle cx="24" cy="36" r="2.5" fill="currentColor"/>
                </svg>
            </div>

            <h1>Event Manager</h1>
            <p class="subtitle">Sign in to your account</p>

            <!-- Flash messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-container">
                {% for category, message in messages %}
                <div class="flash flash-{{ category }}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST" action="/" class="login-form" id="loginForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M10 10a4 4 0 100-8 4 4 0 000 8zm-7 8a7 7 0 0114 0H3z"/>
                        </svg>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username" autofocus>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
                        </svg>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="toggle-pw" id="togglePassword" aria-label="Toggle password visibility">
                            <svg viewBox="0 0 20 20" fill="currentColor" class="eye-open">
                                <path d="M10 3C5 3 1.73 7.11 1 10c.73 2.89 4 7 9 7s8.27-4.11 9-7c-.73-2.89-4-7-9-7zm0 12a5 5 0 110-10 5 5 0 010 10z"/>
                                <circle cx="10" cy="10" r="2.5"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="loginButton">
                    <span>Sign In</span>
                    <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
                </button>
            </form>

            <p class="footer-note">Default admin: <strong>admin</strong> / <strong>admin123</strong></p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function () {
            const pw = document.getElementById('password');
            pw.type = pw.type === 'password' ? 'text' : 'password';
        });

        // Particle background
        createParticles();
    </script>
</body>
</html>
